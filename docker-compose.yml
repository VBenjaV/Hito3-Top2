services:

  # ─────────────────────────────────────────────
  # BASE DE DATOS
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       skyconnect
      POSTGRES_USER:     skyconnect
      POSTGRES_PASSWORD: skyconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyconnect -d skyconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # BACKEND (FastAPI)
  # ─────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://skyconnect:skyconnect@db:5432/skyconnect
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # FRONTEND (React + Vite → Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─────────────────────────────────────────────
  # PRUEBAS DE CARGA (Locust)
  # ─────────────────────────────────────────────
  locust:
    build: ./locust
    command: locust -f locustfile.py --host=http://backend:8000
    ports:
      - "8089:8089"
    depends_on:
      - backend
    volumes:
      - ./locust/results:/home/locust/results

  # ─────────────────────────────────────────────
  # MÉTRICAS (Prometheus)
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # ─────────────────────────────────────────────
  # DASHBOARDS (Grafana)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
